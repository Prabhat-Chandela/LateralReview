name: CI/CD for lateral review

on:
  push:
    branches: [master]
  workflow_dispatch:


permissions: 
  contents: write
    
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: git-checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
            node-version: 18

      - name: Install all dependencies
        run: npm install

      - name: Build
        run: npm run build # The build command of your project

      - name: Push
        uses: JamesIves/github-pages-deploy-action@4.1.0
        with:
          branch: build
          folder: build
